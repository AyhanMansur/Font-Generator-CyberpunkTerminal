<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🟢ℍ𝕒𝕔𝕜𝕖𝕣 𝕊𝕥𝕪𝕝𝕖 𝔽𝕠𝕟𝕥 𝔾𝕖𝕟𝕖𝕣𝕒𝕥𝕠𝕣 | ℂ𝕪𝕓𝕖𝕣𝕡𝕦𝕟𝕜 𝕋𝕖𝕣𝕞𝕚𝕟𝕒𝕝</title>
    <style>
        :root {
            --terminal-green: #0f0;
            --terminal-dim: #003300;
            --bg-color: #050505;
            --glow: 0 0 10px rgba(0, 255, 0, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'VT323', monospace;
            color: var(--terminal-green);
            overflow: hidden; /* Hide scrollbars for full immersion */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Background Canvas */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* CRT Screen Overlay Effects */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .screen-flicker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 0, 0.02);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        /* Main Terminal Container */
        .terminal-container {
            position: relative;
            z-index: 5;
            width: 95%;
            max-width: 800px;
            height: 90vh;
            background-color: rgba(0, 10, 0, 0.9);
            border: 2px solid var(--terminal-green);
            border-radius: 10px;
            box-shadow: 0 0 20px var(--terminal-green), inset 0 0 20px var(--terminal-dim);
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        /* Header */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--terminal-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-shadow: var(--glow);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--terminal-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: var(--glow);
            animation: pulse 2s infinite;
        }

        /* Title with Glitch Effect */
        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            position: relative;
            text-shadow: 2px 2px 0px #ff00ff, -2px -2px 0px #00ffff;
            animation: glitch 1s infinite alternate;
        }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .prompt {
            font-size: 1.5rem;
            padding-top: 5px;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--terminal-green);
            color: var(--terminal-green);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            padding: 10px;
            outline: none;
            text-shadow: var(--glow);
        }

        input::placeholder {
            color: rgba(0, 255, 0, 0.3);
        }

        /* Output Area */
        .output-screen {
            flex-grow: 1;
            background-color: rgba(0, 20, 0, 0.5);
            border: 1px solid var(--terminal-dim);
            padding: 15px;
            overflow-y: auto;
            font-size: 1.8rem;
            line-height: 1.4;
            color: #fff;
            text-shadow: 0 0 5px var(--terminal-green);
            position: relative;
        }

        /* Scrollbar Styling */
        .output-screen::-webkit-scrollbar {
            width: 8px;
        }
        .output-screen::-webkit-scrollbar-track {
            background: #001100;
        }
        .output-screen::-webkit-scrollbar-thumb {
            background: var(--terminal-green);
        }

        /* Button */
        .hack-btn {
            margin-top: 20px;
            background: transparent;
            border: 2px solid var(--terminal-green);
            color: var(--terminal-green);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .hack-btn:hover {
            background: var(--terminal-green);
            color: #000;
            box-shadow: var(--glow);
        }

        .hack-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        @keyframes flicker {
            0% { opacity: 0.02; }
            5% { opacity: 0.05; }
            10% { opacity: 0.02; }
            15% { opacity: 0.06; }
            100% { opacity: 0.02; }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #000;
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            text-align: center;
            padding: 15px;
            position: fixed;
            z-index: 20;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 1.2rem;
            box-shadow: 0 0 15px var(--terminal-green);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .terminal-container { width: 100%; height: 100vh; border: none; border-radius: 0; }
            input { font-size: 1.2rem; }
            .output-screen { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- Background Effects -->
    <canvas id="matrix-canvas"></canvas>
    <div class="crt-overlay"></div>
    <div class="screen-flicker"></div>

    <!-- Main Terminal -->
    <div class="terminal-container">
        <div class="terminal-header">
            <span>ROOT@TERMUX:~</span>
            <div>
                <span class="status-dot"></span> CONNECTED
            </div>
        </div>

        <h1>FONT_INJECTOR.exe</h1>

        <div class="input-group">
            <span class="prompt">></span>
            <input type="text" id="userInput" placeholder="ENTER TARGET TEXT..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="output-screen" id="outputText" aria-live="polite">
            <!-- Output appears here -->
        </div>

        <button class="hack-btn" id="copyBtn">EXECUTE_COPY()</button>
    </div>

    <div id="toast">SYSTEM: TEXT COPIED TO CLIPBOARD</div>

    <script>
        // --- 1. Matrix Rain Animation ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        // Initialize drops
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            // Semi-transparent black to create trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0'; // Green text
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- 2. Font Transformation & Typing Effect ---
        const charMap = {
            'a': '𝕒', 'b': '𝕓', 'c': '𝕔', 'd': '𝕕', 'e': '𝕖', 'f': '𝕗', 'g': '𝕘', 'h': '𝕙', 'i': '𝕚', 'j': '𝕛', 'k': '𝕜', 'l': '𝕝', 'm': '𝕞', 'n': '𝕟', 'o': '𝕠', 'p': '𝕡', 'q': '𝕢', 'r': '𝕣', 's': '𝕤', 't': '𝕥', 'u': '𝕦', 'v': '𝕧', 'w': '𝕨', 'x': '𝕩', 'y': '𝕪', 'z': '𝕫',
            'A': '𝔸', 'B': '𝔹', 'C': 'ℂ', 'D': '𝔻', 'E': '𝔼', 'F': '𝔽', 'G': '𝔾', 'H': 'ℍ', 'I': '𝕀', 'J': '𝕁', 'K': '𝕂', 'L': '𝕃', 'M': '𝕄', 'N': 'ℕ', 'O': '𝕆', 'P': 'ℙ', 'Q': 'ℚ', 'R': 'ℝ', 'S': '𝕊', 'T': '𝕋', 'U': '𝕌', 'V': '𝕍', 'W': '𝕎', 'X': '𝕏', 'Y': '𝕐', 'Z': 'ℤ',
            '0': '𝟘', '1': '𝟙', '2': '𝟚', '3': '𝟛', '4': '𝟜', '5': '𝟝', '6': '𝟞', '7': '𝟟', '8': '𝟠', '9': '𝟡',
            ' ': ' ', '!': '!', '@': '@', '#': '#', '$': '$', '%': '%', '^': '^', '&': '&', '*': '*', '(': '(', ')': ')', '-': '-', '_': '_', '+': '+', '=': '=', '/': '/', '\\': '\\', '.': '.', ',': ',', ';': ';', ':': ':', '?': '?', "'": "'", '"': '"', '€': '€', '£': '£', '¥': '¥'
        };

        const inputEl = document.getElementById('userInput');
        const outputEl = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        let currentTransformedText = '';
        let typingInterval;

        function transformText() {
            const rawText = inputEl.value;
            let result = '';
            
            for (let i = 0; i < rawText.length; i++) {
                const char = rawText[i];
                result += charMap[char] || char;
            }
            
            currentTransformedText = result;
            typeOutText(result);
        }

        function typeOutText(text) {
            // Clear previous typing
            clearInterval(typingInterval);
            outputEl.textContent = '';
            
            let i = 0;
            const speed = 20; // Typing speed in ms

            typingInterval = setInterval(() => {
                if (i < text.length) {
                    outputEl.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typingInterval);
                }
            }, speed);
        }

        // --- 3. Copy Functionality ---
        async function copyText() {
            if (!currentTransformedText) {
                showToast("SYSTEM ERROR: NO DATA TO COPY");
                return;
            }

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(currentTransformedText);
                    showToast("SUCCESS: DATA COPIED");
                } else {
                    fallbackCopy(currentTransformedText);
                }
            } catch (err) {
                fallbackCopy(currentTransformedText);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast("SUCCESS: DATA COPIED");
            } catch (err) {
                showToast("ERROR: COPY FAILED");
            }
            document.body.removeChild(textarea);
        }

        function showToast(message) {
            toast.textContent = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Events
        inputEl.addEventListener('input', transformText);
        copyBtn.addEventListener('click', copyText);
        
        // Enter key support
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                copyText();
            }
        });
    </script>
</body>
</html>
